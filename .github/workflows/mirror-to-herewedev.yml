name: Mirror to HereWeDev

# Soft-fork mirror: every push (and branch/tag delete) is replicated to
# HereWeDev/<repo>. Development continues on this origin; the HereWeDev
# side exists for company-internal install convenience and must never
# diverge — `--prune --force` makes the destination strictly track the
# source.

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:
  workflow_dispatch:

concurrency:
  group: mirror-${{ github.repository }}
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Clone source as bare mirror
        env:
          SRC: ${{ github.repository }}
          SRC_TOKEN: ${{ github.token }}
        # Authenticated clone — required for private source repos and
        # harmless for public ones. The default GITHUB_TOKEN has read
        # access to the workflow's own repo.
        run: git clone --mirror "https://x-access-token:${SRC_TOKEN}@github.com/${SRC}.git" repo.git

      - name: Push to HereWeDev
        working-directory: repo.git
        env:
          PAT: ${{ secrets.HEREWEDEV_MIRROR_PAT }}
          DST_NAME: ${{ github.event.repository.name }}
        run: |
          # Push branches + tags only. --mirror would also push
          # refs/pull/* which GitHub keeps read-only and would fail.
          git push --prune --force \
            "https://x-access-token:${PAT}@github.com/HereWeDev/${DST_NAME}.git" \
            '+refs/heads/*:refs/heads/*' \
            '+refs/tags/*:refs/tags/*'
